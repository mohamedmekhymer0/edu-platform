
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="css/auth.css">

</head>

<body>

<div class="auth-container">

<form id="loginForm"
class="auth-box">

<h2>
Login
</h2>

<input
type="email"
id="email"
class="form-control mb-3"
placeholder="Email"
required>

<input
type="password"
id="password"
class="form-control mb-3"
placeholder="Password"
required>

<button
class="btn btn-primary w-100">

Login

</button>

</form>

</div>

<script src="js/auth.js"></script>

</body>
</html>
