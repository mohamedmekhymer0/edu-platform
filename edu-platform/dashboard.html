
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand">
EduPlatform
</a>

<button
class="btn btn-danger"
onclick="logout()">

Logout

</button>

</div>

</nav>

<div class="container py-5">

<h2 id="welcomeUser">
Welcome
</h2>

<div class="card p-4 mt-4">

<h4>
Learning Progress
</h4>

<div class="progress">

<div
id="progressBar"
class="progress-bar"
style="width:0%">
0%
</div>

</div>

</div>

<div class="row mt-5">

<div class="col-md-6">

<div class="card p-4">

<h4>
Available Courses
</h4>

<a
href="courses.html"
class="btn btn-primary">

View Courses

</a>

</div>

</div>

<div class="col-md-6">

<div class="card p-4">

<h4>
Completed Courses
</h4>

<p id="completedCourses">
0
</p>

</div>

</div>

</div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
